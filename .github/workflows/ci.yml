name: CI

# Gate every push to main and every PR on typecheck + tests across all packages,
# so a red build can't reach the live Vercel deploy. Runs without the private
# recipe data — all tests use the committed fixtures, not the baked db.json.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test
